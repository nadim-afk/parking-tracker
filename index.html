<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parking Pass Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f8f9fa;color:#2c3e50;line-height:1.6;}

.container{max-width:800px;margin:0 auto;padding:20px;}

.header{text-align:center;margin-bottom:40px;padding:30px 0;border-bottom:2px solid #e0e0e0;}
.header h1{font-size:36px;font-weight:700;color:#1a1a1a;margin-bottom:8px;}
.header p{font-size:16px;color:#666;}

.section{background:white;padding:30px;margin-bottom:25px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}

.section-title{font-size:20px;font-weight:600;margin-bottom:20px;color:#1a1a1a;display:flex;align-items:center;}
.section-title::before{content:'';width:4px;height:24px;background:#0066cc;border-radius:2px;margin-right:12px;}

.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:14px;font-weight:600;color:#333;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;}
.form-input,.form-select{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:15px;color:#333;background:white;transition:all 0.2s;}
.form-input:focus,.form-select:focus{outline:none;border-color:#0066cc;box-shadow:0 0 0 3px rgba(0,102,204,0.1);}

.btn{width:100%;padding:12px;background:#0066cc;color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.btn:hover{background:#0052a3;transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,102,204,0.3);}
.btn:active{transform:translateY(0);}

.passes-container{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:25px;}
.pass-card{background:linear-gradient(135deg,#f5f5f5 0%,#ffffff 100%);padding:20px;border-radius:10px;border:2px solid #e0e0e0;text-align:center;}
.pass-card.booked{background:linear-gradient(135deg,#fff3e0 0%,#ffe0b2 100%);border-color:#ffb74d;}

.pass-number{font-size:12px;text-transform:uppercase;letter-spacing:1px;font-weight:700;color:#666;margin-bottom:8px;}
.pass-status{font-size:24px;font-weight:700;margin-bottom:10px;}
.pass-card.booked .pass-status{color:#ff9800;}
.pass-card:not(.booked) .pass-status{color:#0066cc;}

.pass-info{font-size:13px;color:#666;}
.pass-name{font-weight:600;color:#333;margin-bottom:4px;}
.pass-unit{color:#999;margin-bottom:2px;}
.pass-dates{color:#999;font-size:12px;}

.bookings-list{margin-top:20px;}
.booking-item{background:#f9f9f9;padding:16px;border-radius:8px;border-left:4px solid #0066cc;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:15px;}

.booking-details h3{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:6px;}
.booking-details p{font-size:13px;color:#666;margin-bottom:3px;}
.booking-details .meta{font-size:12px;color:#999;}

.booking-pass{display:inline-block;background:#e3f2fd;color:#0066cc;padding:4px 10px;border-radius:4px;font-size:12px;font-weight:600;}
.booking-platform{display:inline-block;background:#f0f0f0;color:#666;padding:4px 10px;border-radius:4px;font-size:12px;font-weight:600;margin-left:6px;}

.remove-btn{padding:6px 12px;background:#ffebee;color:#c62828;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.remove-btn:hover{background:#ffcdd2;box-shadow:0 2px 6px rgba(198,40,40,0.2);}

.empty-state{text-align:center;padding:30px;color:#999;font-size:14px;}
.empty-state svg{margin-bottom:10px;opacity:0.5;}

@media(max-width:600px){
  .passes-container{grid-template-columns:1fr;}
  .header h1{font-size:28px;}
  .booking-item{flex-direction:column;align-items:flex-start;}
}

.stats{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:20px;}
.stat{background:#f0f7ff;padding:16px;border-radius:8px;text-align:center;border:1px solid #d6ebff;}
.stat-label{font-size:12px;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
.stat-value{font-size:28px;font-weight:700;color:#0066cc;}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🅿️ Parking Passes</h1>
    <p>Pre-sell parking spots for your guests</p>
  </div>

  <!-- BOOKING FORM -->
  <div class="section">
    <div class="section-title">New Booking</div>
    
    <div class="form-group">
      <label class="form-label">Guest Name</label>
      <input type="text" class="form-input" id="guestName" placeholder="Enter guest name">
    </div>

    <div class="form-group">
      <label class="form-label">Unit</label>
      <select class="form-select" id="unitSelect">
        <option value="">-- Select unit --</option>
        <option>91 Howe 402</option>
        <option>91 Howe 202</option>
        <option>91 Howe 403</option>
        <option>91 Howe 404</option>
        <option>91 Howe 206</option>
        <option>100 Howe 401</option>
        <option>1000 Howe 412</option>
      </select>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group">
        <label class="form-label">Check-in</label>
        <input type="date" class="form-input" id="checkIn">
      </div>
      <div class="form-group">
        <label class="form-label">Check-out</label>
        <input type="date" class="form-input" id="checkOut">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Platform</label>
      <select class="form-select" id="platform">
        <option value="">-- Select platform --</option>
        <option value="Airbnb">Airbnb</option>
        <option value="VRBO">VRBO</option>
        <option value="Booking.com">Booking.com</option>
      </select>
    </div>

    <button class="btn" onclick="addBooking()">Book Parking Pass</button>
  </div>

  <!-- PASSES STATUS -->
  <div class="section">
    <div class="section-title">Parking Passes</div>
    
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Total</div>
        <div class="stat-value">2</div>
      </div>
      <div class="stat">
        <div class="stat-label">Booked</div>
        <div class="stat-value" id="bookedCount">0</div>
      </div>
    </div>

    <div class="passes-container">
      <div class="pass-card" id="pass1Card">
        <div class="pass-number">Pass #1</div>
        <div class="pass-status">Available</div>
        <div class="pass-info" style="color:#999;">Ready to book</div>
      </div>
      <div class="pass-card" id="pass2Card">
        <div class="pass-number">Pass #2</div>
        <div class="pass-status">Available</div>
        <div class="pass-info" style="color:#999;">Ready to book</div>
      </div>
    </div>
  </div>

  <!-- CURRENT BOOKINGS -->
  <div class="section">
    <div class="section-title">Current Bookings</div>
    <div class="bookings-list" id="bookingsList">
      <div class="empty-state">No bookings yet</div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAcaTiqbuucW0E865PSTmCiuSgjgo8KyRE",
  authDomain: "parking-tracker-2223d.firebaseapp.com",
  projectId: "parking-tracker-2223d",
  storageBucket: "parking-tracker-2223d.firebasestorage.app",
  messagingSenderId: "317250361483",
  appId: "1:317250361483:web:cea1e163749adaa8eb5c8e"
};

let db;

try{
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  db.settings({experimentalForceLongPolling:true});
  setupListeners();
} catch(e){
  alert("Firebase error: " + e.message);
}

function setupListeners() {
  if(!db) return;
  db.collection('bookings').onSnapshot(() => render());
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function calcDays(a, b) {
  if(!a||!b) return 0;
  const d1 = new Date(a), d2 = new Date(b);
  if(isNaN(d1)||isNaN(d2)) return 0;
  return Math.round((d2-d1)/86400000);
}

function datesOverlap(s1, e1, s2, e2) {
  return s1 < e2 && e1 > s2;
}

async function getBookings() {
  try{
    const snap = await db.collection('bookings').get();
    return snap.docs.map(d => ({id:d.id, ...d.data()}));
  } catch(e){
    console.error(e);
    return [];
  }
}

async function addBooking() {
  const name = document.getElementById('guestName').value.trim();
  const unit = document.getElementById('unitSelect').value;
  const checkIn = document.getElementById('checkIn').value;
  const checkOut = document.getElementById('checkOut').value;
  const platform = document.getElementById('platform').value;

  if(!name||!unit||!checkIn||!checkOut||!platform) {
    alert('Please fill all fields');
    return;
  }

  const days = calcDays(checkIn, checkOut);
  if(days <= 0) {
    alert('Check-out date must be after check-in');
    return;
  }

  const bookings = await getBookings();
  const now = new Date();
  const active = bookings.filter(b => new Date(b.checkOut) > now);
  const conflicts = active.filter(b => datesOverlap(checkIn, checkOut, b.checkIn, b.checkOut));

  if(conflicts.length >= 2) {
    alert('Both passes are booked for these dates');
    return;
  }

  try{
    await db.collection('bookings').add({
      guestName: name,
      unit,
      checkIn,
      checkOut,
      platform,
      days,
      addedDate: todayStr()
    });

    document.getElementById('guestName').value = '';
    document.getElementById('unitSelect').value = '';
    document.getElementById('checkIn').value = '';
    document.getElementById('checkOut').value = '';
    document.getElementById('platform').value = '';
    initDates();
    showSuccess('✓ ' + name + ' booked for ' + days + ' day' + (days !== 1 ? 's' : ''));
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

async function removeBooking(id) {
  if(!confirm('Remove this booking?')) return;
  try{
    await db.collection('bookings').doc(id).delete();
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

async function render() {
  const bookings = await getBookings();
  const now = new Date();
  const active = bookings.filter(b => new Date(b.checkOut) > now).sort((a,b) => new Date(a.checkOut) - new Date(b.checkOut));

  document.getElementById('bookedCount').textContent = active.length;

  // Update pass cards
  const pass1 = active[0];
  const pass2 = active[1];

  document.getElementById('pass1Card').className = pass1 ? 'pass-card booked' : 'pass-card';
  document.getElementById('pass1Card').innerHTML = '<div class="pass-number">Pass #1</div>' +
    '<div class="pass-status">' + (pass1 ? 'BOOKED' : 'Available') + '</div>' +
    (pass1 ? '<div class="pass-info"><div class="pass-name">' + pass1.guestName + '</div><div class="pass-unit">' + pass1.unit + '</div><div class="pass-dates">' + pass1.checkIn + ' → ' + pass1.checkOut + '</div></div>' : '<div class="pass-info" style="color:#999;">Ready to book</div>');

  document.getElementById('pass2Card').className = pass2 ? 'pass-card booked' : 'pass-card';
  document.getElementById('pass2Card').innerHTML = '<div class="pass-number">Pass #2</div>' +
    '<div class="pass-status">' + (pass2 ? 'BOOKED' : 'Available') + '</div>' +
    (pass2 ? '<div class="pass-info"><div class="pass-name">' + pass2.guestName + '</div><div class="pass-unit">' + pass2.unit + '</div><div class="pass-dates">' + pass2.checkIn + ' → ' + pass2.checkOut + '</div></div>' : '<div class="pass-info" style="color:#999;">Ready to book</div>');

  // Update bookings list
  let html = '';
  if(active.length === 0) {
    html = '<div class="empty-state">No active bookings</div>';
  } else {
    active.forEach((b, i) => {
      html += '<div class="booking-item">' +
        '<div class="booking-details">' +
        '<h3>' + b.guestName + '</h3>' +
        '<p>' + b.unit + '</p>' +
        '<p class="meta">' + b.checkIn + ' → ' + b.checkOut + ' (' + b.days + ' days)</p>' +
        '<span class="booking-pass">Pass #' + (i+1) + '</span>' +
        '<span class="booking-platform">' + b.platform + '</span>' +
        '</div>' +
        '<button class="remove-btn" onclick="removeBooking(\'' + b.id + '\')">Remove</button>' +
        '</div>';
    });
  }
  document.getElementById('bookingsList').innerHTML = html;
}

function initDates() {
  const t = new Date();
  const tm = new Date(t.getTime() + 86400000);
  const f = (d) => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  document.getElementById('checkIn').value = f(t);
  document.getElementById('checkOut').value = f(tm);
}

function showSuccess(msg) {
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#4caf50;color:white;padding:14px 20px;border-radius:8px;font-size:14px;font-weight:600;z-index:9999;box-shadow:0 4px 12px rgba(76,175,80,0.3);';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

initDates();
render();
</script>

</body>
</html>
